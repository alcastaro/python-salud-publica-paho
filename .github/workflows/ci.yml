name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbformat nbconvert

      - name: Syntax-check Python sources
        run: |
          python -m compileall -q src/ data/ scripts/

      - name: Validate notebooks (parseable, no exec)
        run: |
          python - <<'PY'
          import json, sys
          from pathlib import Path
          import nbformat

          failed = []
          for nb_path in Path("notebooks").glob("*.ipynb"):
              try:
                  nb = nbformat.read(nb_path, as_version=4)
                  nbformat.validate(nb)
                  print(f"  OK  {nb_path}")
              except Exception as e:
                  print(f"  FAIL {nb_path}: {e}")
                  failed.append(nb_path)
          sys.exit(1 if failed else 0)
          PY

      - name: Convert notebooks to scripts (smoke test)
        run: |
          for nb in notebooks/*.ipynb; do
            jupyter nbconvert --to script "$nb" --stdout > /dev/null
            echo "  converted $nb"
          done
